<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <link rel="stylesheet" href="css/contato.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<a href="index.html" class="voltar">← Voltar para Loja</a>

<div class="container">

    <h2 class="titulo">
        Entre em Contato
    </h2>

    <form class="formulário">

        <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        </div>

        <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Digite seu email">
        </div>

        <div class="campo">
            <label for="assunto">Assunto</label>
            <input type="text" id="assunto" name="assunto" placeholder="Digite o assunto">
        </div>

        <div class="campo">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>
        </div>

        <button type="submit" class="botao">
            Enviar Mensagem
        </button>

    </form>

</div>

</body>
</html>
