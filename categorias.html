<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - EcoVida</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <a href="index.html" class="voltar">← Voltar para Loja</a>

    <!-- ================= CONTEÚDO ================= -->

    <div class="container my-5">

        <div class="row">

            <!-- ================= FILTROS ================= -->

            <aside class="col-md-3">

                <h4 class="mb-3">Filtros</h4>

                <!-- Filtro de preço -->
                <div class="mb-4">

                    <label class="form-label">Preço</label>

                    <input type="range" class="form-range">

                </div>

                <!-- Filtro de categoria -->
                <div class="mb-4">

                    <label class="form-label">Categoria</label>

                    <select class="form-select">

                        <option value="roupas">Roupas</option>
                        <option value="beleza">Beleza</option>
                        <option value="casa">Casa</option>
                        <option value="eletrônicos">Eletrônicos</option>
                        <option value="garrafas">Garrafas</option>
                        <option value="sabonete">Sabonetes</option>

                    </select>

                </div>

            </aside>


            <!-- ================= PRODUTOS ================= -->

            <section class="col-md-9">

                <div class="produtos-grid">

                    <!-- Produto 1 -->
                    <div class="card">

                        <img src="imgs/roupa_sustentavel.jpg" class="card-img-top" alt="Produto">

                        <div class="card-body">

                            <h5 class="card-title">Roupas Sustentáveis</h5>

                            <p class="verde">R$ 89,90</p>

                            <button class="btn btn-success">
                                Adicionar ao carrinho
                            </button>

                        </div>

                    </div>

                    <!-- Produto 2 -->
                    <div class="card">

                        <img src="imgs/beleza.webp" class="card-img-top" alt="Produto">

                        <div class="card-body">

                            <h5 class="card-title">Produtos de beleza</h5>

                            <p class="verde">R$ 50,00</p>

                            <button class="btn btn-success">
                                Adicionar ao carrinho
                            </button>

                        </div>

                    </div>

                    <!-- Produto 3 -->
                    <div class="card">

                        <img src="imgs/produtos_casa.jpg" class="card-img-top" alt="Produto">

                        <div class="card-body">

                            <h5 class="card-title">Utensílios de Cozinha</h5>

                            <p class="verde">R$ 109,99</p>

                            <button class="btn btn-success">
                                Adicionar ao carrinho
                            </button>

                        </div>

                    </div>

                    <div class="card">

                        <img src="imgs/garrafas_sustentaveis.avif" class="card-img-top" alt="Produto">

                        <div class="card-body">

                            <h5 class="card-title">Garrafas Sustentáveis</h5>

                            <p class="verde">R$ 39,99</p>

                            <button class="btn btn-success">
                                Adicionar ao carrinho
                            </button>

                        </div>

                    </div>

                    <div class="card">

                        <img src="imgs/garregador_solar.webp" class="card-img-top" alt="Produto">

                        <div class="card-body">

                            <h5 class="card-title">Eletrônicos Sustentáveis</h5>

                            <p class="verde">R$ 129,99</p>

                            <button class="btn btn-success">
                                Adicionar ao carrinho
                            </button>

                        </div>

                    </div>

                    <div class="card">

                        <img src="imgs/sabonete.jpg" class="card-img-top" alt="Produto">

                        <div class="card-body">

                            <h5 class="card-title">Sabonetes Naturais</h5>

                            <p class="verde">R$ 19,90</p>

                            <button class="btn btn-success">
                                Adicionar ao carrinho
                            </button>

                        </div>

                    </div>

                </div>

            </section>

        </div>

    </div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
